# ACP Configurables
# Defines available preferences with metadata, options, types, and defaults.
#
# Structure:
#   namespace:
#     category:
#       subcategory:
#         preference_name:
#           id: 'category.subcategory.preference_name'
#           description: Human-readable description
#           default: default_value
#           type: string | number | boolean
#           options: [array of {name, description, value}]   # for string enums
#           min: N                                            # for number types
#           max: N                                            # for number types
#
# Usage:
#   - acp.preferences.sh uses this file to resolve defaults (precedence level 4)
#   - acp.preferences.sh uses this file to validate option/type constraints
#   - Users browse this file to discover available preferences
#
# Packages may define their own configurables in:
#   agent/configurables/<package-name>.configurables.yaml
#
# Version: 1.1.0
# Last Updated: 2026-05-01

acp:

  # ── Preference index (used by generate_preferences for enumeration) ───────
  _index:
    - plan.draft.create_mode
    - plan.batch.auto_confirm
    - task.create.granularity
    - task.create.auto_number
    - validation.auto_fix.enabled
    - validation.strict_mode.enabled
    - output.verbosity.level
    - git.auto_commit.enabled

  # ── Plan command preferences ──────────────────────────────────────────────

  plan:
    draft:
      create_mode:
        id: 'plan.draft.create_mode'
        description: Define your agent's default behavior when creating draft documents.
        default: structured
        type: string
        options:
          - name: unstructured
            description: |
              Drafts will be created as empty documents placed in the
              appropriate location with appropriate filenames.
            value: unstructured

          - name: structured
            description: |
              Drafts will be created as structured documents with clear
              template sections and placeholders for user input,
              placed in the appropriate location with appropriate filenames.
            value: structured

          - name: guided
            description: |
              Draft contents collected via chat conversation.
              No draft file is created — a summary is provided in chat
              once all context has been gathered interactively.
            value: guided

          - name: contextual
            description: |
              Draft contents inferred from existing context and the inferred
              current user goal. No clarification questions asked, no draft
              file created. The draft summary is provided in chat.
            value: contextual

    batch:
      auto_confirm:
        id: 'plan.batch.auto_confirm'
        description: |
          Automatically confirm batch planning operations without prompting.
          When false (default), the agent presents a summary and waits for
          explicit user approval before processing multiple plans.
        default: false
        type: boolean

  # ── Task preferences ──────────────────────────────────────────────────────

  task:
    create:
      granularity:
        id: 'task.create.granularity'
        description: |
          Default task size in hours used when planning tasks. The agent
          targets tasks of approximately this duration. Larger values produce
          fewer, broader tasks; smaller values produce more atomic tasks.
        default: 3
        type: number
        min: 1
        max: 8

      auto_number:
        id: 'task.create.auto_number'
        description: |
          Automatically assign task numbers when creating new tasks by finding
          the highest existing task number and incrementing by 1.
          When false, the agent prompts for an explicit task number.
        default: true
        type: boolean

  # ── Validation preferences ────────────────────────────────────────────────

  validation:
    auto_fix:
      enabled:
        id: 'validation.auto_fix.enabled'
        description: |
          Automatically fix validation issues when a safe, unambiguous
          correction exists. When false, the agent reports issues without
          applying any changes.
        default: true
        type: boolean

    strict_mode:
      enabled:
        id: 'validation.strict_mode.enabled'
        description: |
          Treat warnings as errors during validation. When true, any
          warning causes validation to fail (non-zero exit). When false,
          only errors cause failure; warnings are reported and ignored.
        default: false
        type: boolean

  # ── Output preferences ────────────────────────────────────────────────────

  output:
    verbosity:
      level:
        id: 'output.verbosity.level'
        description: Default output verbosity level for ACP commands.
        default: normal
        type: string
        options:
          - name: quiet
            description: Minimal output — errors only. Suitable for scripted use.
            value: quiet

          - name: normal
            description: Standard output — progress indicators and final results.
            value: normal

          - name: verbose
            description: |
              Detailed output including debug information, file paths, and
              intermediate state. Useful for troubleshooting.
            value: verbose

  # ── Git preferences ───────────────────────────────────────────────────────

  git:
    auto_commit:
      enabled:
        id: 'git.auto_commit.enabled'
        description: |
          Automatically commit changes after task completion in single-task
          mode. Equivalent to always running @acp.proceed --commit.
          In autonomous mode (--complete), commits are always performed
          per-task regardless of this setting.
        default: false
        type: boolean


# Packages may define their own configurables here or in separate files:
#   agent/configurables/<package-name>.configurables.yaml
#
# Example: agent/configurables/mcp-auth-server-base.configurables.yaml
# defines preferences for commands in the mcp-auth-server-base ACP package.
