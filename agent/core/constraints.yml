# Hard rules — never violate these
# DO NOT add dynamic content to this file

rules:
  - never_load_all_wiki_files: load one section at a time
  - never_load_full_sessions: last 3 entries only
  - never_load_all_lessons: filter by task_type first
  - never_load_full_decisions: load by ADR ID only
  - never_skip_acp_commit: required at every phase boundary and end of every session
  # Knowledge preservation rules — added 2026-05-09 after feedback-001 postmortem
  - write_lessons_at_discovery: never defer lesson logging to end-of-session; write
      immediately when a bug/mistake/finding is confirmed
  - write_session_at_phase_boundary: write a sessions.md entry when a milestone phase,
      audit, or task group completes — do NOT wait for /acp-commit
  - write_patterns_at_discovery: when a reusable pattern emerges, append to patterns.md
      before continuing
  - write_adr_at_decision: when an architectural decision is made, create the ADR entry
      immediately in decisions.md
  - context_overflow_commit_first: if the context window is nearing capacity, write all
      pending ACP entries BEFORE working on implementation
  - validate_prior_session_at_start: on session start (Step 4), check if the most recent
      sessions.md entry covers recent git commits — if not, note the gap in your response
  - never_reopen_closed_adrs: respect DO NOT re-open flags
  - never_use_set_e_without_trap: always trap ERR in bash scripts
  - never_break_macos: test BSD sed and date compatibility before committing
  - never_use_gdate_without_fallback: wrap date +%N with linux/macos detection

# Context budget: a discipline practice, not a hard technical limit.
# Modern LLMs have 100K+ context windows — this budget enforces reproducibility and focus.
# Exceed deliberately when needed; never exceed silently.
context_budget:
  layer1_max_tokens: 500
  layer2_max_tokens: 1000
  layer3_max_tokens: 3500
  total_max_tokens: 5000

agents_md_rules:
  max_bytes: 15000        # ~15KB hard limit — exceeding this may break tool auto-load
  warn_at_bytes: 12000   # ~12KB soft warning threshold
  rationale: "AGENTS.md, CLAUDE.md, and copilot-instructions.md are auto-loaded by some tools; must stay compact"
  files_to_check:
    - AGENTS.md
    - CLAUDE.md
    - .github/copilot-instructions.md
  warning_threshold: 0.80

bash_rules:
  - use_set_euo_pipefail: true
  - trap_err_when_set_e: true
  - quote_all_variables: true
  - use_local_in_functions: true
  - cross_platform_sed: "sed -i '' on macOS, sed -i on Linux — detect with uname"
  - cross_platform_date: "date +%N unavailable on macOS — use $RANDOM or python fallback"

command_doc_rules:
  - every_command_needs_directive_header: "🤖 Agent Directive block at top"
  - every_command_needs_scripts_field: "Scripts: None or list of bound scripts"
  - every_command_needs_verification: checklist at bottom
  - version_bump_on_breaking_change: true

test_rules:
  - e2e_tests_in_e2e_dir: all integration tests go in e2e/
  - unit_tests_in_tests_dir: pure unit tests go in tests/
  - every_test_uses_common_sh: source tests/common.sh for helpers
  - no_network_in_unit_tests: unit tests must be offline
