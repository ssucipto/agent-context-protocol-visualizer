# DO NOT add dynamic content to this file (no dates, no task IDs)
# This file is prompt-cached by the LLM API after first call

project: agent-context-protocol-visualizer
type: web-app                  # web dashboard / visualization tool
description: >
  Web dashboard that renders ACP Enhanced's agent/progress.yaml into an
  interactive, sortable, searchable UI with milestone tables, task trees,
  fuzzy search, status filtering, and auto-refresh via file watcher.

stack:
  - primary: TypeScript
  - framework: TanStack Start (React SSR)
  - backend: None (reads local YAML files via Node.js server functions)
  - deployment: Vercel (static + serverless)

team: solo-developer
priorities:
  - code-quality
  - correctness
  - maintainability

repo: github.com/ssucipto/agent-context-protocol-visualizer

team: solo-developer
priorities:
  - correctness: command docs must be unambiguous for any LLM
  - shell_compat: every .sh must pass on macOS AND Linux
  - token_efficiency: ACP itself must model what it preaches
  - test_coverage: every command must have an E2E test file

fork_of: github.com/prmichaelsen/agent-context-protocol
repo: github.com/ssucipto/acp-enhanced
version: 6.8.2

