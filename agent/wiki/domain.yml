# Domain Entity Model — ACP Protocol project
# Load ONE section at a time — never load the entire file
# last_verified: 2026-06-04

commands:
  count: 64  # 64 total: 61 acp.* + 2 git.* + 1 command.template.md (verified 2026-06-03)
  location: agent/commands/
  naming: "acp.{command-name}.md — dot notation, acp namespace for core; git.{command}.md for git namespace"
  categories:
    core: [acp.audit, acp.commit, acp.decide, acp.dispatch, acp.feedback, acp.handoff, acp.index, acp.init, acp.install, acp.memory-sync, acp.plan, acp.proceed, acp.report, acp.resume, acp.route, acp.sessions, acp.spec, acp.status, acp.sync, acp.task, acp.task-create, acp.update, acp.validate, acp.wiki-update]
    artifact: [acp.artifact-glossary, acp.artifact-reference, acp.artifact-research]
    clarification: [acp.clarification-address, acp.clarification-capture, acp.clarification-create]
    design: [acp.command-create, acp.design-create, acp.design-reference, acp.pattern-create]
    package: [acp.package-create, acp.package-info, acp.package-install, acp.package-list, acp.package-publish, acp.package-remove, acp.package-search, acp.package-update, acp.package-validate]
    project: [acp.project-create, acp.project-info, acp.project-list, acp.project-remove, acp.project-set, acp.project-update, acp.projects-restore, acp.projects-sync]
    preferences: [acp.preferences-create, acp.preferences-get, acp.preferences-set, acp.preferences-show, acp.preferences-validate]
    version: [acp.version-check, acp.version-check-for-updates, acp.version-update]
    local: [acp.cost-report]
    git: [git.commit, git.init]
  entries:
    - command: acp.audit
      category: core
      purpose: Deep-dive investigation of a subject, producing a structured report in agent/reports/.
    - command: acp.commit
      category: core
      purpose: Persist session work into the ACP memory layer — write session summary, stamp completed routing tasks, check for reusable patterns and new ADRs, compact old sessions.
    - command: acp.decide
      category: core
      purpose: Record a significant architectural decision as an ADR in agent/memory/decisions.md with a DO-NOT-re-open condition to prevent future agents from relitigating settled choices.
    - command: acp.dispatch
      category: core
      purpose: Invoke the ACP dispatch engine (Persona B/C) to execute a routing task via OpenRouter API, assembling context-optimised prompts and streaming LLM responses.
    - command: acp.feedback
      category: core
      purpose: Capture structured developer feedback about ACP system failures, protocol gaps, or improvement suggestions; write to agent/feedback/feedback-NNN.md.
      category: core
      purpose: Generate a context-aware handoff report for transferring work to an agent in a different context.
    - command: acp.index
      category: core
      purpose: Manage the key file index — list, add, remove, explore, and show indexed key files.
    - command: acp.init
      category: core
      purpose: Initialize agent context by loading all documentation, reviewing source code, and preparing for work.
    - command: acp.install
      category: core
      purpose: Install or upgrade ACP Enhanced in the current project directory; copies static ACP files while preserving user state.
      category: core
      purpose: Compress old session history into monthly summaries, flag stale patterns, and check wiki files for re-verification — keeps the memory layer lean without losing history.
    - command: acp.plan
      category: core
      purpose: Plan milestones or tasks for undefined items in progress.yaml or new requirements.
    - command: acp.proceed
      category: core
      purpose: Immediately implement the current or next task, with support for autonomous and parallel execution modes.
    - command: acp.report
      category: core
      purpose: Generate a comprehensive project status report including progress, accomplishments, and next steps.
    - command: acp.resume
      category: core
      purpose: Resume work on a project by initializing context, reviewing recent progress, and continuing with the next task.
    - command: acp.route
      category: core
      purpose: Route a task to the cheapest capable AI executor by classifying it against the taxonomy and creating a route file with cost estimates.
    - command: acp.sessions
      category: core
      purpose: Manage and view active agent sessions across projects.
    - command: acp.spec
      category: core
      purpose: Generate a specification document from a clarification, design, draft, requirements doc, or interactive input.
    - command: acp.status
      category: core
      purpose: Display current project status including milestone progress, current task, recent work, and next steps.
    - command: acp.sync
      category: core
      purpose: Synchronize documentation with source code by identifying and updating stale documentation.
    - command: acp.task
      category: core
      purpose: Create, list, read, and stamp routing task files in agent/routing/tasks/ (CRUD wrapper for the routing task layer).
    - command: acp.task-create
      category: core
      purpose: Create task files with proper structure, milestone linking, and automatic progress.yaml updates.
    - command: acp.update
      category: core
      purpose: Update progress.yaml with latest project status, task completion, and recent work.
    - command: acp.validate
      category: core
      purpose: Validate all ACP documents for structure, consistency, correctness, and namespace conventions.
    - command: acp.wiki-update
      category: core
      purpose: Keep wiki files accurate after project evolution — update only the affected section without rewriting the entire file.
    - command: acp.artifact-glossary
      category: artifact
      purpose: Create and maintain project glossaries through auto-extraction and interactive refinement.
    - command: acp.artifact-reference
      category: artifact
      purpose: Create reference guides for passive information after a command-first principle check.
    - command: acp.artifact-research
      category: artifact
      purpose: Create long-lived research artifacts via systematic investigation with web/MCP integration and quality standards.
    - command: acp.clarification-address
      category: clarification
      purpose: Address clarification responses by researching, exploring code/web, using tools, and presenting recommendations.
    - command: acp.clarification-capture
      category: clarification
      internal: true
      purpose: Capture decisions from ephemeral clarification files and chat context into permanent entity documents.
    - command: acp.clarification-create
      category: clarification
      purpose: Create clarification documents from file input or chat to gather detailed requirements.
    - command: acp.command-create
      category: design
      purpose: Create command files with namespace enforcement, draft support, and automatic package updates.
    - command: acp.design-create
      category: design
      purpose: Create design documents with namespace enforcement, draft support, and automatic package updates.
    - command: acp.design-reference
      category: design
      internal: true
      purpose: Discover and cross-reference design documents to ensure tasks have complete implementation detail.
    - command: acp.pattern-create
      category: design
      purpose: Create pattern files with namespace enforcement, draft support, and automatic package updates.
    - command: acp.package-create
      category: package
      purpose: Create a new ACP package with full ACP installation, release branch configuration, and pre-commit hooks.
    - command: acp.package-info
      category: package
      purpose: Display detailed information about a specific installed package (local or global).
    - command: acp.package-install
      category: package
      purpose: Install third-party command packages from git repositories using the package-install script.
    - command: acp.package-list
      category: package
      purpose: List installed ACP packages with versions, file counts, and optional details.
    - command: acp.package-publish
      category: package
      purpose: Automated package publishing with validation, version detection, CHANGELOG generation, and testing.
    - command: acp.package-remove
      category: package
      purpose: Remove installed ACP packages and clean up the manifest.
    - command: acp.package-search
      category: package
      purpose: Discover ACP packages on GitHub using the GitHub API.
    - command: acp.package-update
      category: package
      purpose: Update installed ACP packages to their latest versions with smart conflict detection.
    - command: acp.package-validate
      category: package
      purpose: Comprehensive package validation with shell and LLM checks, auto-fix, and test installation.
    - command: acp.project-create
      category: project
      purpose: Create a new generic ACP project (not a package) with full ACP installation and guided setup.
    - command: acp.project-info
      category: project
      purpose: Display detailed information about a specific project from the global registry.
    - command: acp.project-list
      category: project
      purpose: List all projects registered in the global workspace registry.
    - command: acp.project-remove
      category: project
      purpose: Remove a project from the global registry with optional directory deletion.
    - command: acp.project-set
      category: project
      purpose: Switch to a different project in the global registry, updating working directory and last-accessed timestamp.
    - command: acp.project-update
      category: project
      purpose: Update project metadata (status, description, tags, related projects) in the global registry.
    - command: acp.projects-restore
      category: project
      purpose: Restore/clone missing projects from their registered git origins.
    - command: acp.projects-sync
      category: project
      purpose: Discover unregistered ACP projects in ~/.acp/projects/ and add them to the registry.
    - command: acp.preferences-create
      category: preferences
      purpose: Create preference files at a specified level (user/workspace/project) with default values from configurables.
    - command: acp.preferences-get
      category: preferences
      purpose: Resolve and display preferences for a given namespace with full precedence applied.
    - command: acp.preferences-set
      category: preferences
      purpose: Set a preference value at a specified level (user/workspace/project) with validation.
    - command: acp.preferences-show
      category: preferences
      purpose: Display the effective preference set for a namespace with source attribution for each value.
    - command: acp.preferences-validate
      category: preferences
      purpose: Validate all preference files across all levels against their configurables schemas.
    - command: acp.version-check
      category: version
      purpose: Display current ACP version and compatibility information.
    - command: acp.version-check-for-updates
      category: version
      purpose: Check if a newer version of ACP is available without applying updates.
    - command: acp.version-update
      category: version
      purpose: Update ACP files (AGENT.md, templates, scripts) to the latest version.
    - command: acp.cost-report
      category: local
      local_only: true
      purpose: Read the routing ledger, group spend by executor, calculate actual vs. baseline cost (vs. all-Claude-Sonnet baseline), and produce taxonomy improvement suggestions.
    - command: git.commit
      category: git
      purpose: Automate version detection, changelog updates, and git commits with proper semantic versioning.
    - command: git.init
      category: git
      purpose: Initialize a git repository with an intelligent .gitignore based on detected project type.

scripts:
  count: 29
  location: agent/scripts/
  naming: "acp.{feature}.sh"
  key_scripts:
    - acp.common.sh       # shared utilities — portable sed wrapper, color init, common helpers; source first
    - acp.yaml-parser.sh  # pure-bash YAML parser — yaml_get, yaml_set, yaml_get_array; zero deps
    - acp.yaml-validate.sh  # validates YAML against ACP schema definitions
    - acp.install.sh      # bootstraps ACP directory structure and template files into a project
    - acp.package-install.sh  # installs packages from GitHub with commands/scripts/patterns/designs support
  entries:
    - script: acp.common.sh
      implements: Shared utility library providing portable sed wrapper, tput-based color initialization, and common helper functions sourced by all ACP scripts.
    - script: acp.install.sh
      implements: Sets up the ACP directory structure and copies template files into a target project, bootstrapping a new ACP installation.
    - script: acp.meta-scan.sh
      implements: Scans any file type for language-agnostic @acp.meta.* marker blocks and emits structured metadata (topic, requirements, kind) as a flat output stream.
    - script: acp.package-create.sh
      implements: Creates a new ACP package scaffold directory with full structure, package.yaml, and a bundled ACP installation.
    - script: acp.package-info.sh
      implements: Displays detailed information about an installed ACP package from the local or global manifest.
    - script: acp.package-install-optimized.sh
      implements: Installs third-party ACP packages from a git repo using batched file operations for improved performance (supports patterns/commands/designs).
    - script: acp.package-install.sh
      implements: Installs third-party ACP packages from a git repo with full support for patterns, commands, designs, files, indices, experimental features, and dry-run listing.
    - script: acp.package-list.sh
      implements: Lists all installed ACP packages with version, modification status, and optional outdated/verbose filtering.
    - script: acp.package-publish.sh
      implements: Automates package publishing with schema validation, semantic versioning, and optional testing before pushing to a git release branch.
    - script: acp.package-remove.sh
      implements: Removes an installed ACP package and updates the manifest, with optional auto-confirm and modified-file protection flags.
    - script: acp.package-search.sh
      implements: Searches for ACP packages on GitHub via the GitHub API, filtered by keyword, tag, user, or org.
    - script: acp.package-update.sh
      implements: Updates installed ACP packages to their latest versions, with check-only, skip-modified, and force flags.
    - script: acp.package-validate.sh
      implements: Validates a package directory against ACP schema rules, tracking pass/fail/warning counts and listing fixable issues.
    - script: acp.preferences.sh
      implements: Unified preferences system supporting get, set, validate, generate, and preset operations, usable as a direct CLI or sourced library.
    - script: acp.project-info.sh
      implements: Displays detailed metadata for a named project from the global ~/.acp/projects.yaml registry.
    - script: acp.project-list.sh
      implements: Lists all registered projects from the global registry with optional type, status, and tags filtering.
    - script: acp.project-remove.sh
      implements: Removes a project entry from the global registry, optionally deleting the project directory from the filesystem.
    - script: acp.project-set.sh
      implements: Switches the active project in the global registry and changes the working directory to the project path.
    - script: acp.project-update.sh
      implements: Updates project metadata fields (status, description, type, git origin, tags, related projects) in the global registry.
    - script: acp.projects-restore.sh
      implements: Clones/restores projects from their stored git origins in the registry, with optional ACP installation and dry-run mode.
    - script: acp.projects-sync.sh
      implements: Discovers unregistered ACP projects in ~/.acp/projects/ by scanning for agent/progress.yaml and adds them to the registry.
    - script: acp.sessions.sh
      implements: Global session tracking for concurrent multi-project agent work; supports register, deregister, list, clean, heartbeat, and count subcommands.
    - script: acp.uninstall.sh
      implements: Removes all ACP files and directories from a project, with optional auto-confirm flag.
    - script: acp.version-check-for-updates.sh
      implements: Checks for available ACP updates by comparing the local AGENT.md against the remote repository version.
    - script: acp.version-check.sh
      implements: Extracts and displays the current ACP version from the local AGENT.md file.
    - script: acp.version-update.sh
      implements: Downloads and applies the latest AGENT.md, template files, and utility scripts from the upstream repository, re-execing via a temp copy to survive self-overwrite.
    - script: acp.yaml-parser.sh
      implements: Pure POSIX shell YAML parser with a lexer, AST builder, and query engine; zero external dependencies, portable across macOS/Linux.
    - script: acp.yaml-validate.sh
      implements: Validates YAML files against ACP schema definitions, reporting typed errors and warnings with pass/fail counts.

schemas:
  count: 5
  location: agent/schemas/
  entries:
    - schema: package.schema.yaml
      validates: package.yaml — the descriptor for any ACP package
      key_fields: [name, version, description, author, license, repository]
    - schema: progress.schema.yaml
      validates: agent/progress.yaml — per-project task and milestone progress tracking
      key_fields: [project, milestones, tasks]
    - schema: projects.schema.yaml
      validates: ~/.acp/projects.yaml — the global multi-project registry
      key_fields: [registry_version, last_updated, current_project, projects]
    - schema: driver.schema.yaml
      validates: agent/driver.yaml — pluggable driver configuration
      key_fields: [name, type, server, method]
    - schema: task.schema.yaml
      validates: sub-task DAG for parallel + orchestrator-workers task types
      key_fields: [id, title, executor, depends_on]

