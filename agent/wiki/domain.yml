      coverage: get_preference(), has_preference(), get_preference_or(), get_preference_source(), generate_preferences()
      test_count: 5
    - suite: acp.project-registry.test.sh
      coverage: Project registry CRUD functions in acp.common.sh
      test_count: 4
    - suite: acp.yaml-parser.test.sh
      coverage: YAML parser AST — lexer, parser, query engine, array operations, edge cases
      test_count: 20
    - suite: yaml-array-operations.test.sh
