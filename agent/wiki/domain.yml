    - command: acp.version-check
      category: version
      purpose: Display current ACP version and compatibility information.
    - command: acp.version-check-for-updates
      category: version
      purpose: Check if a newer version of ACP is available without applying updates.
    - command: acp.version-update
      category: version
      purpose: Update ACP files (AGENT.md, templates, scripts) to the latest version.
    - command: acp.cost-report
      category: local
      local_only: true
      purpose: Read the routing ledger, group spend by executor, calculate actual vs. baseline cost (vs. all-Claude-Sonnet baseline), and produce taxonomy improvement suggestions.
    - command: git.commit
      category: git
      purpose: Automate version detection, changelog updates, and git commits with proper semantic versioning.
    - command: git.init
      category: git
      purpose: Initialize a git repository with an intelligent .gitignore based on detected project type.

scripts:
  count: 29
  location: agent/scripts/
  naming: "acp.{feature}.sh"
  key_scripts:
    - acp.common.sh       # shared utilities — portable sed wrapper, color init, common helpers; source first
    - acp.yaml-parser.sh  # pure-bash YAML parser — yaml_get, yaml_set, yaml_get_array; zero deps
    - acp.yaml-validate.sh  # validates YAML against ACP schema definitions
    - acp.install.sh      # bootstraps ACP directory structure and template files into a project
    - acp.package-install.sh  # installs packages from GitHub with commands/scripts/patterns/designs support
  entries:
    - script: acp.common.sh
      implements: Shared utility library providing portable sed wrapper, tput-based color initialization, and common helper functions sourced by all ACP scripts.
    - script: acp.install.sh
      implements: Sets up the ACP directory structure and copies template files into a target project, bootstrapping a new ACP installation.
    - script: acp.meta-scan.sh
      implements: Scans any file type for language-agnostic @acp.meta.* marker blocks and emits structured metadata (topic, requirements, kind) as a flat output stream.
    - script: acp.package-create.sh
      implements: Creates a new ACP package scaffold directory with full structure, package.yaml, and a bundled ACP installation.
    - script: acp.package-info.sh
      implements: Displays detailed information about an installed ACP package from the local or global manifest.
    - script: acp.package-install-optimized.sh
      implements: Installs third-party ACP packages from a git repo using batched file operations for improved performance (supports patterns/commands/designs).
    - script: acp.package-install.sh
      implements: Installs third-party ACP packages from a git repo with full support for patterns, commands, designs, files, indices, experimental features, and dry-run listing.
    - script: acp.package-list.sh
      implements: Lists all installed ACP packages with version, modification status, and optional outdated/verbose filtering.
    - script: acp.package-publish.sh
      implements: Automates package publishing with schema validation, semantic versioning, and optional testing before pushing to a git release branch.
    - script: acp.package-remove.sh
      implements: Removes an installed ACP package and updates the manifest, with optional auto-confirm and modified-file protection flags.
    - script: acp.package-search.sh
      implements: Searches for ACP packages on GitHub via the GitHub API, filtered by keyword, tag, user, or org.
    - script: acp.package-update.sh
      implements: Updates installed ACP packages to their latest versions, with check-only, skip-modified, and force flags.
    - script: acp.package-validate.sh
      implements: Validates a package directory against ACP schema rules, tracking pass/fail/warning counts and listing fixable issues.
    - script: acp.preferences.sh
      implements: Unified preferences system supporting get, set, validate, generate, and preset operations, usable as a direct CLI or sourced library.
    - script: acp.project-info.sh
      implements: Displays detailed metadata for a named project from the global ~/.acp/projects.yaml registry.
    - script: acp.project-list.sh
      implements: Lists all registered projects from the global registry with optional type, status, and tags filtering.
    - script: acp.project-remove.sh
      implements: Removes a project entry from the global registry, optionally deleting the project directory from the filesystem.
    - script: acp.project-set.sh
      implements: Switches the active project in the global registry and changes the working directory to the project path.
    - script: acp.project-update.sh
      implements: Updates project metadata fields (status, description, type, git origin, tags, related projects) in the global registry.
    - script: acp.projects-restore.sh
      implements: Clones/restores projects from their stored git origins in the registry, with optional ACP installation and dry-run mode.
    - script: acp.projects-sync.sh
      implements: Discovers unregistered ACP projects in ~/.acp/projects/ by scanning for agent/progress.yaml and adds them to the registry.
    - script: acp.sessions.sh
      implements: Global session tracking for concurrent multi-project agent work; supports register, deregister, list, clean, heartbeat, and count subcommands.
    - script: acp.uninstall.sh
      implements: Removes all ACP files and directories from a project, with optional auto-confirm flag.
    - script: acp.version-check-for-updates.sh
      implements: Checks for available ACP updates by comparing the local AGENT.md against the remote repository version.
    - script: acp.version-check.sh
      implements: Extracts and displays the current ACP version from the local AGENT.md file.
    - script: acp.version-update.sh
      implements: Downloads and applies the latest AGENT.md, template files, and utility scripts from the upstream repository, re-execing via a temp copy to survive self-overwrite.
    - script: acp.yaml-parser.sh
      implements: Pure POSIX shell YAML parser with a lexer, AST builder, and query engine; zero external dependencies, portable across macOS/Linux.
    - script: acp.yaml-validate.sh
      implements: Validates YAML files against ACP schema definitions, reporting typed errors and warnings with pass/fail counts.

schemas:
  count: 5
  location: agent/schemas/
  entries:
    - schema: package.schema.yaml
      validates: package.yaml — the descriptor for any ACP package
      key_fields: [name, version, description, author, license, repository]
    - schema: progress.schema.yaml
      validates: agent/progress.yaml — per-project task and milestone progress tracking
      key_fields: [project, milestones, tasks]
    - schema: projects.schema.yaml
      validates: ~/.acp/projects.yaml — the global multi-project registry
      key_fields: [registry_version, last_updated, current_project, projects]
    - schema: driver.schema.yaml
      validates: agent/driver.yaml — pluggable driver configuration
      key_fields: [name, type, server, method]
    - schema: task.schema.yaml
      validates: sub-task DAG for parallel + orchestrator-workers task types
      key_fields: [id, title, executor, depends_on]

