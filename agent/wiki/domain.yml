session_memory_protocol:
  # Added: 2026-05-09 (v6.4.13, feedback-001 fixes, audit-008)
  description: >
    sessions.md is a WAL (write-ahead log) for agent session knowledge.
    Write at the MOMENT OF DISCOVERY. Do NOT defer to session end.
    Context overflow is silent — the session can terminate at any turn
    without a final message, permanently losing any unwritten knowledge.
  write_triggers:
    - milestone_phase_completes: "Write sessions.md entry immediately"
    - audit_report_created: "Capture key findings in lessons.md"
    - architectural_decision_made: "Create ADR in decisions.md immediately"
    - new_reusable_pattern_found: "Append to patterns.md immediately"
    - correction_given: "Append to lessons.md immediately (Correction Protocol)"
    - context_approaching_overflow: "Write sessions.md BEFORE summarisation"
    - git_commit_over_5_files: "Treat as phase boundary — write sessions.md"
  command: "/acp-commit"
  command_doc: "agent/commands/acp.commit.md"
  version_introduced: "6.4.13"
  related_feedback: "agent/feedback/feedback-001-proactive-commit-and-knowledge-preservation.md"
  related_audit: "agent/reports/audit-008-feedback-001-knowledge-preservation.md"

git_branch_awareness:
  # Added: 2026-05-11 (v6.5.0, feedback-002 fixes, M39)
  description: >
    Optional git branch safety system. When identity.yml contains a git_workflow: block,
    Step 1b of the context-loading protocol checks the current branch and halts if on
    the production branch. Safe no-op by default (git_workflow is commented out).
  identity_yml_field:
    name: git_workflow
    optional: true
    default: commented_out
    fields:
      default_working_branch: "Branch agent commits to by default (e.g. develop, mainline)"
      production_branch: "Never commit directly to this branch (e.g. main)"
      branch_model: "gitflow-lite | trunk | github-flow — intent, not enforced"
  protocol_step: "Step 1b — Git Branch Safety Check (conditional)"
  commit_guard: "Step 0 in acp.commit.md v1.2.0 — Pre-commit Branch Guard"
  session_schema_field: "branch: (optional in sessions.md entry — omit if git_workflow not configured)"
  version_introduced: "6.5.0"
  related_feedback: "agent/feedback/feedback-002-acp-git-branch-awareness.md"
  related_audit: "agent/reports/audit-010-feedback-002-003-implementation-plan.md"

pre_impl_audit_protocol:
  # Added: 2026-05-11 (v6.6.0, feedback-003 fixes, M40)
  description: >
    Structured pre-implementation readiness check triggered by /acp-audit --pre-impl.
    Runs 4 phases before implementation begins to catch field name mismatches, missing
    imports, stale carryovers, and planning gaps that cause bugs or rework.
  flag: "--pre-impl"
  command: "acp.audit.md v1.1.0+"
  phases:
    - "1 — Plan Correctness: route/task file, files_affected list, open blockers"
    - "2 — Code Cross-Reference: field names, enum values, import paths, HTTP methods vs. codebase"
    - "3 — Carryover Check: reads carryovers: key from audit-carryovers.md"
    - "4 — Operational Completeness: version bump, wiki update, route file existence"
  verdict: "READY or BLOCKED — single-sentence summary"
  version_introduced: "6.6.0"
  related_feedback: "agent/feedback/feedback-003-pre-implementation-audit.md"
  related_audit: "agent/reports/audit-010-feedback-002-003-implementation-plan.md"

audit_carryovers:
  # Added: 2026-05-11 (v6.6.0, feedback-003 fixes, M40)
  description: >
    Memory layer for tracking unresolved audit findings that require follow-up across sessions.
    Written by /acp-audit (all modes) when actionable findings exist. Read by Step 4.4 of the
    context-loading protocol at every session start. Zero noise when empty or all fixed.
  file: "agent/memory/audit-carryovers.md"
  root_key: "carryovers:"
  schema_fields:
    audit_id: "Source audit number (integer)"
    finding_id: "Phase+number code from source audit (e.g. P2-1)"
    severity: "critical | high | medium | low"
    file: "Path to the file containing the issue"
    finding: "One-line description of what needs to be fixed"
    status: "pending | in-progress | fixed"
    fix_applied_date: "YYYY-MM-DD when status changed to fixed (null until fixed)"
    verified_in_audit: "Audit ID that confirmed the fix worked (null until verified)"
    escalated_to: "Audit ID if re-discovered in a later audit (null by default)"
  lifecycle:
    write: "At end of /acp-audit, for each actionable unresolved finding"
    check: "Step 4.4 reads carryovers: list at every session start"
    update: "Set status: fixed + fix_applied_date when fix applied"
    verify: "Set verified_in_audit after next audit confirms fix"
    remove: "Safe to delete entry once verified_in_audit is set"
  protocol_step: "Step 4.4 — Audit Carryover Check (conditional)"
  version_introduced: "6.6.0"

ux_review:
  # Added: 2026-05-11 (v6.8.0, M42, STRUCT-003)
  description: >
    UX analysis of ACP workflow — command surface, cognitive load, interaction patterns,
    comparison vs alternatives, token saving estimates. Originally at scripts/FINAL-REVIEW.md;
    moved to agent/design/ so it is discoverable by the context-loading protocol.
  file: "agent/design/acp-ux-review.md"
  category: design
  version_introduced: "6.8.0"
